name: publish
on:
  push:
    tags:
      - '*'
jobs:
  publish:
    name: Set version from tag
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check tag format
        run: |
          if ! [[ ${{ github.ref }} =~ ^refs/tags/[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}$ ]]; then
            echo "Tag format must be x.y.z"
            exit 1
          fi

      - name: Get version
        run: echo "version=${GITHUB_REF/refs\/tags\//}" >> $GITHUB_ENV

      - name: Set version in composer.json
        run: |
          jq '.extra."typo3/cms".version = "${{ env.version }}"' composer.json > tmp.json && mv tmp.json composer.json

      - name: Set version in ext_emconf.php
        run: |
          sed -i "s/'version' => '[^']*'/'version' => '${{ env.version }}'/" ext_emconf.php

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add composer.json ext_emconf.php
          git commit -m "Set version to ${{ env.version }}"
          git push
